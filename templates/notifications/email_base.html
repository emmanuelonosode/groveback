<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>{% block subject %}Hasker &amp; Co. Realty Group{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <!--[if mso]><style>* { font-family: Arial, sans-serif !important; }</style><![endif]-->
  <style>
    body  { margin: 0; padding: 0; background-color: #E8E5DC; }
    img   { border: 0; display: block; }
    a     { text-decoration: none; }
    table { border-collapse: collapse; mso-table-lspace: 0; mso-table-rspace: 0; }
    @media only screen and (max-width: 600px) {
      .email-outer  { padding: 24px 0 40px !important; }
      .header-cell  { padding: 18px 22px !important; }
      .content-cell { padding: 32px 24px !important; }
      .footer-cell  { padding: 24px 22px !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#E8E5DC;-webkit-font-smoothing:antialiased;font-family:'DM Sans',Arial,sans-serif;">

{% load i18n %}

<table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#E8E5DC">
  <tr>
    <td align="center" style="padding:48px 16px 64px;" class="email-outer">

      <!-- EMAIL CARD -->
      <table width="580" cellpadding="0" cellspacing="0" border="0" style="max-width:580px;width:100%;background-color:#ffffff;border:1px solid #F1F5F9;box-shadow:0 8px 32px rgba(11,31,58,0.07),0 2px 6px rgba(11,31,58,0.04);">

        <!-- ── HEADER ───────────────────────────────────────── -->
        <tr>
          <td bgcolor="#ffffff" style="padding:24px 40px 20px;border-bottom:1px solid #F1F5F9;" class="header-cell">
            <img
              src="{{ frontend_url }}/logo/logo.png"
              alt="Hasker &amp; Co. Realty Group"
              height="38"
              style="display:block;height:38px;width:auto;max-width:180px;"
            />
          </td>
        </tr>

        <!-- ── HERO IMAGE (optional, per-template) ─────────── -->
        {% block hero_image %}{% endblock %}

        <!-- ── BODY ─────────────────────────────────────────── -->
        <tr>
          <td bgcolor="#ffffff" style="padding:40px 40px 36px;" class="content-cell">
            {% block content %}{% endblock %}
          </td>
        </tr>

        <!-- ── FOOTER ───────────────────────────────────────── -->
        <tr>
          <td bgcolor="#FBF9F4" align="center" style="padding:28px 40px 28px;border-top:1px solid #F1F5F9;" class="footer-cell">

            <!-- Social row -->
            <p style="margin:0 0 16px;font-family:'DM Sans',Arial,sans-serif;font-size:12px;color:#94A3B8;">
              <a href="https://www.instagram.com/haskerrealtygroup/" style="color:#64748B;text-decoration:none;">Instagram</a>
              &nbsp;&middot;&nbsp;
              <a href="https://www.facebook.com/haskerrealtygroup" style="color:#64748B;text-decoration:none;">Facebook</a>
              &nbsp;&middot;&nbsp;
              <a href="https://www.linkedin.com/company/hasker-realty-group" style="color:#64748B;text-decoration:none;">LinkedIn</a>
            </p>

            <!-- Divider -->
            <div style="width:32px;height:1px;background-color:#E2E8F0;margin:0 auto 14px;"></div>

            <!-- Legal -->
            <p style="margin:0 0 4px;font-family:'DM Sans',Arial,sans-serif;font-size:11px;color:#94A3B8;line-height:1.6;">
              &copy; {% now "Y" %} Hasker &amp; Co. Realty Group &nbsp;&bull;&nbsp; Equal Housing Opportunity
            </p>
            <p style="margin:0;font-family:'DM Sans',Arial,sans-serif;font-size:11px;color:#94A3B8;line-height:1.6;">
              Questions? <a href="mailto:info@haskerrealtygroup.com" style="color:#64748B;text-decoration:none;">info@haskerrealtygroup.com</a>
              &nbsp;&bull;&nbsp;
              <a href="tel:+17572082767" style="color:#64748B;text-decoration:none;">(757) 208-2767</a>
            </p>
          </td>
        </tr>

      </table><!-- /email card -->
    </td>
  </tr>
</table><!-- /wrapper -->

</body>
</html>
